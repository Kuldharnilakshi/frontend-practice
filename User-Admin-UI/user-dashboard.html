<!DOCTYPE html>
<html>
<head>
<title>Safeguard AI - User Dashboard</title>
<link rel="stylesheet" href="user.css">
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>Safeguard AI</h2>

<ul>
<li>🏠 Dashboard</li>
<li>📍 Location</li>
<li>🚨 Emergency</li>
<li>🎤 Voice Detection</li>
<li>🤖 AI Monitoring</li>
<li>⚙ Settings</li>

</ul>

</div>

<!-- Main Content -->

<div class="main">

<h1>User Safety Dashboard</h1>

<div class="cards">

<div class="card location">
<h3>📍 Location</h3>
<p>Live Location Tracking</p>
<button>Enable Tracking</button>
</div>

<div class="card sos">
<h3>🚨 SOS</h3>
<p>Send Emergency Alert</p>
<button class="danger">Send SOS</button>
</div>

<div class="card voice">
<h3>🎤 Voice SOS</h3>
<p>Say "Help" to trigger alert</p>
<button>Start Listening</button>
</div>

<div class="card ai">
<h3>🤖 AI Monitoring</h3>
<p>Detect scream & danger sounds</p>
<button class="ai-btn">Start AI</button>
</div>

</div>

</div>

</div>

</body>
</html>
